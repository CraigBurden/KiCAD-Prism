services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    platform: linux/amd64
    container_name: kicad-prism-backend
    restart: unless-stopped
    volumes:
      # Mount projects directory for persistence
      - /kicad-prism/data/projects:/app/projects
      # Mount SSH directory for Git persistence (GitLab/GitHub SSH)
      - /kicad-prism/data/ssh:/root/.ssh:rw
    environment:
      - PYTHONUNBUFFERED=1
      # Root directory for storing projects
      - KICAD_PROJECTS_ROOT=/app/projects
      # Friendly workspace name shown on login page
      - WORKSPACE_NAME=${WORKSPACE_NAME:-KiCAD Prism}
      # OIDC/OAuth2 Configuration (required for authentication)
      - OIDC_ISSUER_URL=${OIDC_ISSUER_URL:-}
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID:-}
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET:-}
      - OIDC_SCOPES=${OIDC_SCOPES:-openid profile email}
      - OIDC_EMAIL_CLAIM=${OIDC_EMAIL_CLAIM:-email}
      - OIDC_NAME_CLAIM=${OIDC_NAME_CLAIM:-name}
      - OIDC_PICTURE_CLAIM=${OIDC_PICTURE_CLAIM:-picture}
      - OIDC_PROVIDER_NAME=${OIDC_PROVIDER_NAME:-}
      - OIDC_TOKEN_AUTH_METHOD=${OIDC_TOKEN_AUTH_METHOD:-client_secret_post}
      - OAUTH_SERVICE_TOKEN_TTL_SECONDS=${OAUTH_SERVICE_TOKEN_TTL_SECONDS:-3600}
      - OAUTH_EXTERNAL_JWT_ISSUER_URL=${OAUTH_EXTERNAL_JWT_ISSUER_URL:-}
      - OAUTH_EXTERNAL_JWT_AUDIENCE=${OAUTH_EXTERNAL_JWT_AUDIENCE:-}
      - OAUTH_EXTERNAL_JWT_ROLE_CLAIM=${OAUTH_EXTERNAL_JWT_ROLE_CLAIM:-prism_role}
      - OAUTH_EXTERNAL_JWT_SCOPES_CLAIM=${OAUTH_EXTERNAL_JWT_SCOPES_CLAIM:-scope}
      - OAUTH_EXTERNAL_JWT_CLIENT_ID_CLAIM=${OAUTH_EXTERNAL_JWT_CLIENT_ID_CLAIM:-client_id}
      - ALLOWED_USERS_STR=${ALLOWED_USERS_STR:-}
      - ALLOWED_DOMAINS_STR=${ALLOWED_DOMAINS_STR:-}
      - BOOTSTRAP_ADMIN_USERS_STR=${BOOTSTRAP_ADMIN_USERS_STR:-}
      - DEFAULT_VIEWER_DOMAINS_STR=${DEFAULT_VIEWER_DOMAINS_STR:-}
      - ROLE_STORE_PATH=${ROLE_STORE_PATH:-}
      - SESSION_SECRET=${SESSION_SECRET:-}
      - SESSION_TTL_HOURS=${SESSION_TTL_HOURS:-12}
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-false}
      - CORS_ORIGINS_STR=${CORS_ORIGINS_STR:-http://127.0.0.1:5173,http://localhost:5173,http://127.0.0.1:8080,http://localhost:8080}
      # Set to false to disable authentication entirely
      - AUTH_ENABLED=${AUTH_ENABLED:-true}
      # Development mode (set to false for production/bundling)
      - DEV_MODE=false
      # GitHub Token for private repository access (optional)
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - CATALOG_SQLITE_PATH=${CATALOG_SQLITE_PATH:-/app/projects/.kicad-prism/prism.sqlite3}
      - CATALOG_DBL_EXPORT_DIR=${CATALOG_DBL_EXPORT_DIR:-/app/projects/.kicad-prism/exports/kicad-dbl}
      - CATALOG_KLC_ENABLED=${CATALOG_KLC_ENABLED:-false}
      - CATALOG_KLC_UTILS_PATH=${CATALOG_KLC_UTILS_PATH:-/opt/kicad-library-utils}
      - CATALOG_KLC_RELEASE_GATE=${CATALOG_KLC_RELEASE_GATE:-warn}
      - CATALOG_KLC_TIMEOUT_SECONDS=${CATALOG_KLC_TIMEOUT_SECONDS:-30}
      - CATALOG_KLC_SYMBOL_RULES=${CATALOG_KLC_SYMBOL_RULES:-}
      - CATALOG_KLC_SYMBOL_EXCLUDE_RULES=${CATALOG_KLC_SYMBOL_EXCLUDE_RULES:-}
      - CATALOG_KLC_FOOTPRINT_RULES=${CATALOG_KLC_FOOTPRINT_RULES:-}
      - CATALOG_KLC_FOOTPRINT_EXCLUDE_RULES=${CATALOG_KLC_FOOTPRINT_EXCLUDE_RULES:-}
      - CATALOG_KLC_FOOTPRINT_LIB_DIR=${CATALOG_KLC_FOOTPRINT_LIB_DIR:-}
      - REMOTE_PROVIDER_LIBRARY_PREFIX=${REMOTE_PROVIDER_LIBRARY_PREFIX:-remote}
      - REMOTE_PROVIDER_DESTINATION_DIR=${REMOTE_PROVIDER_DESTINATION_DIR:-$${KIPRJMOD}/RemoteLibrary}
      - REMOTE_PROVIDER_OAUTH_CLIENT_ID=${REMOTE_PROVIDER_OAUTH_CLIENT_ID:-kicad-prism-kicad}
      - REMOTE_PROVIDER_ACCESS_TOKEN_TTL_SECONDS=${REMOTE_PROVIDER_ACCESS_TOKEN_TTL_SECONDS:-3600}
      - REMOTE_PROVIDER_REFRESH_TOKEN_TTL_SECONDS=${REMOTE_PROVIDER_REFRESH_TOKEN_TTL_SECONDS:-604800}
      - GIT_SCAN_KNOWN_HOSTS_ON_STARTUP=${GIT_SCAN_KNOWN_HOSTS_ON_STARTUP:-false}
      - UVICORN_WORKERS=${UVICORN_WORKERS:-1}
    command: >
      sh -c 'python3 -m uvicorn app.main:app           
      --host 0.0.0.0 
      --port 8000 
      --workers $${UVICORN_WORKERS:-1} 
      --proxy-headers --forwarded-allow-ips="*"'
  frontend:
    build: ./frontend
    container_name: kicad-prism-frontend
    restart: unless-stopped
    depends_on:
      - backend
  oauth2-proxy:
    image: 'quay.io/oauth2-proxy/oauth2-proxy:latest'
    container_name: oauth-proxy
    expose:
      - '4180'
    environment:
      - OAUTH2_PROXY_PROVIDER=google
      - 'OAUTH2_PROXY_CLIENT_ID=${OAUTH2_PROXY_CLIENT_ID}'
      - 'OAUTH2_PROXY_CLIENT_SECRET=${OAUTH2_PROXY_CLIENT_SECRET}'
      - 'OAUTH2_PROXY_COOKIE_SECRET=${OAUTH2_PROXY_COOKIE_SECRET}'
      - 'OAUTH2_PROXY_EMAIL_DOMAINS=plentify.io,plentify.co.za'
      - 'OAUTH2_PROXY_UPSTREAMS=http://frontend:80'
      - 'OAUTH2_PROXY_HTTP_ADDRESS=0.0.0.0:4180'
      - 'OAUTH2_PROXY_REDIRECT_URL=${OAUTH2_REDIRECT_URL}''
